<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Bump Recorder — Community Road Quality</title>
<link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet">
<style>
  :root { --navy:#0B1524; --card:#14202f; --line:#26374a; --fg:#e7edf3; --sub:#9fb0c2; --accent:#22c55e; }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; font:14px/1.45 system-ui, sans-serif; color:var(--fg); background:var(--navy); }
  #map { position:fixed; inset:0; }

  /* Floating round buttons */
  .fab { position:fixed; z-index:5; width:44px; height:44px; border-radius:12px; border:1px solid var(--line);
         background:rgba(20,32,47,.92); color:var(--fg); display:grid; place-items:center; cursor:pointer;
         box-shadow:0 2px 10px rgba(0,0,0,.4); }
  .fab:hover { background:rgba(30,44,62,.96); }
  .fab svg { width:22px; height:22px; }
  #menuBtn { top:12px; left:12px; }
  #potholeBtn { top:12px; right:12px; color:rgba(255,255,255,.5); }
  #potholeBtn.on { color:#FF5722; border-color:#FF5722; }
  #funnelBtn { top:12px; right:64px; }
  #funnelBtn.on { border-color:var(--accent); color:var(--accent); }
  .hidden { display:none !important; }

  /* All-time totals — vertical stack down the right edge, under the buttons */
  #totals { position:fixed; z-index:4; top:64px; right:12px; display:flex; flex-direction:column; gap:8px; width:104px; }
  #totals .t { background:rgba(20,32,47,.92); border:1px solid var(--line); border-radius:12px; padding:8px 6px;
               text-align:center; box-shadow:0 2px 10px rgba(0,0,0,.4); }
  #totals .n { font-weight:800; font-size:16px; }
  #totals .l { color:var(--sub); font-size:9px; text-transform:uppercase; letter-spacing:.03em; }

  /* Left drawer */
  #scrim { position:fixed; inset:0; z-index:8; background:rgba(0,0,0,.45); opacity:0; pointer-events:none;
           transition:opacity .2s; }
  #scrim.open { opacity:1; pointer-events:auto; }
  #drawer { position:fixed; z-index:9; top:0; left:0; bottom:0; width:300px; max-width:85vw; background:var(--navy);
            border-right:1px solid var(--line); transform:translateX(-100%); transition:transform .22s;
            display:flex; flex-direction:column; padding:16px; gap:14px; overflow-y:auto; }
  #drawer.open { transform:none; }
  #drawer h1 { font-size:18px; margin:4px 0 0; }
  #drawer .muted { color:var(--sub); font-size:12px; }
  #drawer .sep { height:1px; background:var(--line); margin:4px 0; }
  #account { display:flex; flex-direction:column; gap:10px; }
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:10px; border-radius:10px;
         border:1px solid var(--line); background:var(--card); color:var(--fg); font-size:14px; cursor:pointer; }
  .btn:hover { background:#1b2b3d; }
  .btn.primary { background:var(--accent); border-color:var(--accent); color:#062812; font-weight:700; }
  input[type=email], input[type=password] { width:100%; padding:9px 10px; border-radius:10px; border:1px solid var(--line);
         background:var(--card); color:var(--fg); }
  .row { display:flex; align-items:center; gap:8px; }
  label.toggle { display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--sub); }
  a { color:#7fb3ff; }

  /* Filter overlay */
  #filter { position:fixed; z-index:6; top:64px; right:12px; width:320px; max-width:calc(100% - 24px);
            background:rgba(20,32,47,.97); border:1px solid var(--line); border-radius:14px; padding:14px;
            box-shadow:0 6px 24px rgba(0,0,0,.5); }
  #filter .head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  #filter .head b { font-size:13px; }
  #filter .x { cursor:pointer; color:var(--sub); border:none; background:none; font-size:18px; }
  #filter .rangeRow { display:flex; align-items:center; gap:8px; margin:6px 0; }
  #filter .rangeRow .lab { color:var(--sub); font-size:11px; min-width:64px; }
  #filter input[type=range] { flex:1; }
  #filter .kpis { display:flex; gap:8px; margin-top:10px; }
  #filter .k { flex:1; text-align:center; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:8px 4px; }
  #filter .k .n { font-weight:800; font-size:15px; }
  #filter .k .l { color:var(--sub); font-size:9px; text-transform:uppercase; }
  #filter .allTime { margin-top:10px; text-align:center; }
  #filter .allTime a { cursor:pointer; font-size:12px; }
</style>
</head>
<body>
<div id="map"></div>

<button id="menuBtn" class="fab" aria-label="Menu">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
</button>

<div id="totals"></div>

<button id="potholeBtn" class="fab" aria-label="Toggle potholes">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M12 3l9.5 17H2.5z"/><path d="M12 10v4M12 17h.01"/></svg>
</button>

<button id="funnelBtn" class="fab hidden" aria-label="Filter by time">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 4h18l-7 8v6l-4 2v-8z"/></svg>
</button>

<div id="filter" class="hidden">
  <div class="head"><b>Time filter</b><button class="x" id="filterClose" aria-label="Close">×</button></div>
  <div class="rangeRow"><span class="lab">From <b id="fromLbl"></b></span><input id="from" type="range" min="0" value="0"></div>
  <div class="rangeRow"><span class="lab">To <b id="toLbl"></b></span><input id="to" type="range" min="0" value="0"></div>
  <div class="kpis" id="window"></div>
  <div class="allTime"><a id="allTime">↺ Show all time</a></div>
</div>

<div id="scrim"></div>
<aside id="drawer">
  <h1>Bump Recorder</h1>
  <div class="muted">Community road quality, crowdsourced.</div>
  <div class="sep"></div>
  <div id="account"></div>
  <div style="flex:1"></div>
  <div class="muted"><a href="../privacy.html">Privacy</a> · <a href="../terms.html">Terms</a></div>
</aside>

<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>
<script type="module">
import { initMap, applyWindow, clearWindow, setPotholesVisible } from './map.js';
import { initAuth, currentSession, onAuth, signInGoogle, signInApple, signInEmail, signOut } from './auth.js';
import { sumWindow, monthsOf, fmt } from './stats.js';

// Public config (same public values the app ships; anon key + URL are safe).
const SB = 'https://lnrdlolvxnarmrsxyrry.supabase.co';
const ANON = 'sb_publishable__h9370XSWgSEFfyKHLccpA_RqTXWKPt';
const rest = (t) => fetch(`${SB}/rest/v1/${t}`, { headers: { apikey: ANON } }).then(r => r.json());
const arr = (v) => Array.isArray(v) ? v : [];

// --- data: all-time totals (chip) + monthly buckets (filter numbers) ---------
let monthly = [], months = [];
let totals = { roads_km:0, potholes:0, contributors:0, covered_km2:0 };
try {
  const [m, t] = await Promise.all([
    rest('dashboard_monthly?select=*&order=month.asc'),
    rest('dashboard_totals?select=*'),
  ]);
  monthly = arr(m); months = monthsOf(monthly);
  totals = arr(t)[0] || totals;
} catch { /* offline: render empty chip, map still works */ }

const tile = (n, l) => `<div class="t"><div class="n">${n}</div><div class="l">${l}</div></div>`;
document.getElementById('totals').innerHTML =
  tile(fmt(Math.round(totals.roads_km)), 'road-km') +
  tile(fmt(totals.potholes), 'potholes') +
  tile(fmt(totals.contributors), 'contributors') +
  tile(fmt(Math.round(totals.covered_km2)), 'km²');

// --- map (created once; overlays never re-render it) -------------------------
const map = await initMap(document.getElementById('map'), SB, ANON);

// Potholes: floating top-right toggle (mobile style), OFF by default.
const potholeBtn = document.getElementById('potholeBtn');
let potholesOn = false;
const applyPotholes = () => {
  setPotholesVisible(map, potholesOn);
  potholeBtn.classList.toggle('on', potholesOn);
};
potholeBtn.onclick = () => { potholesOn = !potholesOn; applyPotholes(); };
applyPotholes(); // start hidden

// --- drawer (pure CSS toggle, no map interaction) ----------------------------
const drawer = document.getElementById('drawer'), scrim = document.getElementById('scrim');
const openDrawer = (open) => { drawer.classList.toggle('open', open); scrim.classList.toggle('open', open); };
document.getElementById('menuBtn').onclick = () => openDrawer(!drawer.classList.contains('open'));
scrim.onclick = () => openDrawer(false);

// --- funnel + filter (visibility is pure CSS; only slider VALUE hits the map) -
const funnelBtn = document.getElementById('funnelBtn');
const filter = document.getElementById('filter');
const fromEl = document.getElementById('from'), toEl = document.getElementById('to');
fromEl.max = toEl.max = Math.max(0, months.length - 1);
toEl.value = Math.max(0, months.length - 1);

const totalsEl = document.getElementById('totals');
// Opening the filter reuses the right-edge space, so tuck the totals away then.
const showFilter = (open) => {
  filter.classList.toggle('hidden', !open);
  funnelBtn.classList.toggle('on', open);
  totalsEl.classList.toggle('hidden', open);
};
funnelBtn.onclick = () => showFilter(filter.classList.contains('hidden'));
document.getElementById('filterClose').onclick = () => showFilter(false);

// Update the filter's labels + window KPIs. Pure/local — NEVER touches the map.
function updateWindowUI() {
  let i = +fromEl.value, j = +toEl.value; if (i > j) [i, j] = [j, i];
  const from = months[i], to = months[j];
  document.getElementById('fromLbl').textContent = from?.slice(0, 7) ?? '';
  document.getElementById('toLbl').textContent = to?.slice(0, 7) ?? '';
  const w = sumWindow(monthly, from, to);
  document.getElementById('window').innerHTML =
    `<div class="k"><div class="n">${fmt(Math.round(w.km_added))}</div><div class="l">road-km</div></div>` +
    `<div class="k"><div class="n">${fmt(w.potholes_added)}</div><div class="l">potholes</div></div>` +
    `<div class="k"><div class="n">${fmt(w.new_contributors)}</div><div class="l">people</div></div>`;
  return { from, to };
}
// Scrubbing a slider is the ONLY thing that refetches the map (into window mode).
fromEl.oninput = toEl.oninput = () => {
  const { from, to } = updateWindowUI();
  if (from && to) applyWindow(map, from, to);
};
document.getElementById('allTime').onclick = () => {
  fromEl.value = 0; toEl.value = months.length - 1;
  updateWindowUI();             // reset the numbers
  clearWindow(map);             // revert map to the all-time (mobile) layer
};

// --- auth: drives ONLY the drawer account UI + funnel visibility --------------
initAuth(SB, ANON);
const account = document.getElementById('account');

function renderAccount(session) {
  const loggedIn = !!session;
  funnelBtn.classList.toggle('hidden', !loggedIn);
  if (!loggedIn) { showFilter(false); clearWindow(map); }
  if (loggedIn) {
    const email = session.user?.email ?? 'Signed in';
    account.innerHTML = `<div class="muted">Signed in as</div><div style="font-weight:700;overflow-wrap:anywhere">${email}</div>`;
    const out = document.createElement('button'); out.className = 'btn'; out.textContent = 'Sign out';
    out.onclick = () => signOut();
    account.append(document.createElement('div'), out);
  } else {
    account.innerHTML = `<div class="muted">Sign in to filter the map by time.</div>`;
    const g = mkBtn('Continue with Google', () => signInGoogle(), true);
    const a = mkBtn('Continue with Apple', () => signInApple(), true);
    const email = Object.assign(document.createElement('input'), { type:'email', placeholder:'Email' });
    const pw = Object.assign(document.createElement('input'), { type:'password', placeholder:'Password' });
    const err = Object.assign(document.createElement('div'), { className:'muted' });
    const sub = mkBtn('Sign in with email', async () => {
      err.textContent = '';
      const msg = await signInEmail(email.value.trim(), pw.value);
      if (msg) err.textContent = msg;
    });
    account.append(g, a, hr(), email, pw, sub, err);
  }
}
function mkBtn(text, onClick, primary) {
  const b = document.createElement('button');
  b.className = 'btn' + (primary ? ' primary' : ''); b.textContent = text; b.onclick = onClick;
  return b;
}
const hr = () => Object.assign(document.createElement('div'), { className:'sep' });

onAuth((session) => renderAccount(session));
renderAccount(await currentSession());
updateWindowUI(); // seed the filter labels/numbers; map stays all-time until a scrub
</script>
</body>
</html>
